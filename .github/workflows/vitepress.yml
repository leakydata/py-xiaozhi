# Workflow name, can be customized
name: Deploy GitHub Pages

# Trigger: automatically run this workflow when code is pushed to the master branch
on:
  push:
    branches:
      - main

# Jobs
jobs:
  build-and-deploy:
    # Server environment: latest Ubuntu, can also use a custom version
    runs-on: ubuntu-latest
    steps:
      # Checkout code
      - name: Checkout
        uses: actions/checkout@v2
        with: 
          fetch-depth: 0

      # Set up Node.js version
      - name: Setup Node.js environment
        uses: actions/setup-node@v1
        with:
          node-version: "18.20.3"
      # Install yarn
      - name: Install yarn
        run: npm i yarn -g

      # Install dependencies if cache miss
      - name: Install dependencies
        run: cd documents && yarn install

      # Generate static files
      - name: Build
        run: cd documents && yarn docs:build

      # Deploy to GitHub Pages
      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v2
        env:
         GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }} # ACCESS_TOKEN is the created Secret name, replace with your own
        with:
          target-branch: gh-pages # Deploy to gh-pages branch; master branch stores project source code, while gh-pages branch stores the generated static files
          build_dir: documents/docs/.vitepress/dist # Directory where VitePress generates and stores static files