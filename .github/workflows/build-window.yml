name: Setup Inno Setup, Conda, and Build

on:
  push:
    branches:
      - main

jobs:
  setup-and-build:
    runs-on: windows-latest
    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Inno Setup
      - name: Install Inno Setup (via Chocolatey)
        run: choco install innosetup -y
        shell: powershell

      # Download ChineseSimplified.isl file
      - name: Download Chinese language file
        run: |
          $languageDir = "C:\Program Files (x86)\Inno Setup 6\Languages"

          # Ensure directory exists
          if (-not (Test-Path $languageDir)) {
            New-Item -ItemType Directory -Path $languageDir -Force
          }
          
          # Download Chinese language file
          Invoke-WebRequest -Uri "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl" -OutFile "$languageDir\ChineseSimplified.isl"
          
          Write-Host "Downloaded Chinese language file to $languageDir\ChineseSimplified.isl"

          # Verify file exists
          if (Test-Path "$languageDir\ChineseSimplified.isl") {
            Write-Host "File downloaded successfully!"
          } else {
            Write-Error "File download failed!"
            exit 1
          }
        shell: powershell

      # Find ISCC.exe path and update build.json
      - name: Find ISCC.exe path and update build.json
        run: |
          # Get ISCC path
          $isccPath = Get-Command ISCC.exe | Select-Object -ExpandProperty Source
          
          # Set environment variable
          $envLine = "ISCC_PATH=$($isccPath -replace '`r','' -replace '`n','')"
          [System.IO.File]::AppendAllText($env:GITHUB_ENV, "$envLine`n", [System.Text.Encoding]::UTF8)
          
          # Read JSON content
          $jsonPath = "build.json"
          $json = Get-Content $jsonPath -Raw | ConvertFrom-Json
          
          # Set new Inno Setup path
          $json.inno_setup_path = $isccPath
          
          # Write back JSON file, formatted as UTF-8 encoding
          $json | ConvertTo-Json -Depth 10 | Out-File -FilePath $jsonPath -Encoding UTF8
          
          Write-Host "Updated Inno Setup path in build.json to: $isccPath"
        shell: powershell

      # Install Miniconda and Conda
      - name: Install Miniconda and Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.10"
          auto-update-conda: true
          auto-activate-base: false
          activate-environment: py-xiaozhi

      # Create Conda environment and install dependencies
      - name: Create Conda environment py-xiaozhi
        shell: bash -el {0}
        run: conda create -n py-xiaozhi python=3.10 -y

      # Create a simple requirements.txt file (if it does not exist)
      - name: Create requirements.txt
        run: |
          if (-not (Test-Path "requirements.txt")) {
            Set-Content -Path "requirements.txt" -Value ""
          }
        shell: powershell

      # Install Python dependencies (pip + conda + pyinstaller)
      - name: Install Python dependencies (pip + conda + pyinstaller)
        shell: bash -el {0}
        run: |
          conda activate py-xiaozhi
          
          # Install dependencies
          pip install -r requirements.txt -i https://mirrors.aliyun.com/pypi/simple
          conda install pyqt=5.15.10 opencv=4.10.0 -y
          pip install pyinstaller

      # Clone UnifyPy repository
      - name: Clone UnifyPy repository
        run: git clone https://github.com/huangjunsen0406/UnifyPy.git
        shell: bash

      # Run UnifyPy to build the project
      - name: Run UnifyPy to build the project
        shell: bash -el {0}
        run: |
          conda activate py-xiaozhi
          export PYTHONIOENCODING=utf-8
          python UnifyPy/main.py . --config build.json

      # Upload Inno Setup installer only
      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installer-setup
          path: installer/
